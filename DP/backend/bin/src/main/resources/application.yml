server:
  forward-headers-strategy: framework

spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/kids_shop
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    property-naming-strategy: SNAKE_CASE

  web:
    resources:
      add-mappings: false
    error:
      whitelabel:
        enabled: false

